<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EB5D7"/>
      <stop offset="100%" stop-color="#319060"/>
    </linearGradient>
  </defs>
  <!-- Black rounded background -->
  <rect width="100" height="100" rx="14" fill="#000000"/>
  <!-- MFCC text in brand gradient, two lines for legibility at small sizes -->
  <text x="50" y="48" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="38" fill="url(#g)" letter-spacing="-1">MF</text>
  <text x="50" y="80" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="38" fill="url(#g)" letter-spacing="-1">CC</text>
</svg>
